version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: gymemo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gymemo

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymemo-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/gymemo
      - JWT_SECRET=your_production_secret_key_here
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:3001
    container_name: gymemo-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
